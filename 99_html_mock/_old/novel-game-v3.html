<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>都市伝説JK百合ホラー v3.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
        }
        .character-container {
            position: absolute;
            bottom: 100;
            left: 50%;
            transform: translateX(-50%);
            width: 70vw;
            max-width: 1000px;
            height: 200vh;
            overflow: hidden;
            z-index: 32;
            pointer-events: none;
        }
        .character-image {
            width: 100%;
            height: 120%;
            object-fit: cover;
            object-position: center 35%;
        }
        .dialog-box {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 0;
            width: 84%;
            max-width: 1200px;
            height: 230px;
            background: rgba(5, 8, 15, 0.92);
            border: 1.5px solid #1f2937;
            box-shadow: 0 12px 28px rgba(0,0,0,0.6);
            border-radius: 12px 12px 0 0;
            clip-path: polygon(2% 0, 98% 0, 100% 14%, 100% 100%, 0 100%, 0 14%);
            padding: 2rem 2.5rem;
            overflow: hidden;
            z-index: 40;
        }
        /* removed gradient overlay */
        .dialog-name {
            display: inline-flex; align-items: center; gap: 10px;
            color: #a7f3d0; font-size: 1.125rem; font-weight: 800; letter-spacing: .02em;
            text-shadow: 0 0 8px rgba(16,185,129,.25);
            margin-bottom: 0.75rem;
        }
        .name-diamond { width: 14px; height: 14px; transform: rotate(45deg); background: #10b981; border: 2px solid #34d399; border-radius: 2px; box-shadow: 0 0 8px rgba(16,185,129,.4); }
        @keyframes smokeDisappear {
            0% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.95) translateY(-10px);
            }
            100% {
                opacity: 0;
                transform: scale(0.8) translateY(-30px);
                filter: blur(10px);
            }
        }
        .smoke-out {
            animation: smokeDisappear 0.8s ease-out forwards;
        }
        .red-overlay {
            animation: redFlash 2s ease-in-out;
        }
        @keyframes redFlash {
            0%, 100% { background-color: rgba(139, 0, 0, 0.3); }
            50% { background-color: rgba(220, 38, 38, 0.8); }
        }
        @keyframes glitch {
            0% {
                transform: translate(0);
            }
            20% {
                transform: translate(-2px, 2px);
            }
            40% {
                transform: translate(-2px, -2px);
            }
            60% {
                transform: translate(2px, 2px);
            }
            80% {
                transform: translate(2px, -2px);
            }
            100% {
                transform: translate(0);
            }
        }
        @keyframes glitch-scan {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 100% 100%;
            }
        }
        .glitch-effect {
            position: relative;
        }
        .glitch-effect::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 0, 0.03) 0px,
                rgba(0, 255, 0, 0.03) 1px,
                transparent 1px,
                transparent 2px
            );
            animation: glitch-scan 0.3s linear infinite;
            pointer-events: none;
            z-index: 20;
        }
        .glitch-effect::after {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(90deg, rgba(255,0,0,0.1) 0%, transparent 10%, transparent 90%, rgba(0,255,255,0.1) 100%);
            animation: glitch 0.3s infinite;
            pointer-events: none;
            z-index: 20;
            opacity: 0.6;
        }
        .dialog-text {
            line-height: 1.1;
            white-space: pre-wrap;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }
        .flowchart-node {
            transition: all 0.3s;
            cursor: pointer;
        }
        .flowchart-node:hover {
            transform: scale(1.05);
        }
        .flowchart-preview {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #9333ea;
            border-radius: 8px;
            padding: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
        }
        .flowchart-preview.show {
            opacity: 1;
        }
        .flowchart-preview img {
            width: 200px;
            height: auto;
            display: block;
            border-radius: 4px;
        }
        .flowchart-line {
            stroke: #4b5563;
            stroke-width: 2;
        }
        .flowchart-line.visited {
            stroke: #9333ea;
            stroke-width: 3;
        }
        /* VN frame UI */
        .ui-topbar, .ui-bottombar {
            position: absolute; left: 0; right: 0; height: 64px;
            background: #05080f;
            background-image: radial-gradient(rgba(255,255,255,.06) 1px, transparent 1px);
            background-size: 8px 8px;
            opacity: .9; pointer-events: none; z-index: 8;
        }
        .ui-topbar { top: 0; border-bottom: 1px solid #1f2937; }
        .ui-bottombar { bottom: 0; border-top: 1px solid #1f2937; }
        .ui-icons {
            position: absolute; top: 12px; right: 12px;
            display: flex; gap: 12px; pointer-events: auto;
        }
        .icon-diamond {
            width: 44px; height: 44px; transform: rotate(45deg);
            background: linear-gradient(180deg,#10b981,#059669);
            border: 2px solid #34d399; border-radius: 8px;
            box-shadow: 0 0 12px rgba(16,185,129,.5);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .icon-diamond span { transform: rotate(-45deg); color: #001b14; font-size: 20px; }
        .icon-diamond:hover { filter: brightness(1.1); }
        .cg-frame {
            position: absolute; inset: 80px 48px; pointer-events: none; z-index: 6;
        }
        .cg-frame::before {
            content: ''; position: absolute; inset: 0;
            border: 2px solid rgba(255,255,255,.08); border-radius: 12px;
            box-shadow: 0 0 24px rgba(0,0,0,.6);
        }
        .cg-frame::after {
            content: ''; position: absolute; inset: 0;
            clip-path: polygon(3% 0, 97% 0, 100% 7%, 100% 93%, 97% 100%, 3% 100%, 0 93%, 0 7%);
            border: 0; border-radius: 14px;
        }
        .cg-frame .cg-inner {
            position: absolute; inset: 8px; border-radius: 12px; overflow: hidden;
            background-size: cover; background-position: center; filter: none;
            clip-path: polygon(3% 0, 97% 0, 100% 7%, 100% 93%, 97% 100%, 3% 100%, 0 93%, 0 7%);
        }
        /* QTE button precise hit area */
        .qte-button {
            -webkit-clip-path: circle(var(--r,70px) at 50% 50%);
            clip-path: circle(var(--r,70px) at 50% 50%);
        }
        /* Title particles */
        .title-particles {
            position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 5;
        }
        .title-particles .particle {
            position: absolute; bottom: -20px; width: var(--s,4px); height: var(--s,4px);
            background: radial-gradient(circle, rgba(255,255,255,.95) 0%, rgba(255,255,255,0) 60%);
            border-radius: 50%; box-shadow: 0 0 12px rgba(147,51,234,.35);
            filter: blur(.2px);
            animation: title-rise var(--d,12s) linear infinite; animation-delay: var(--delay,0s);
            opacity: var(--o,.75); transform: translateX(0) scale(var(--scale,1));
        }
        @keyframes title-rise {
            0% { transform: translate(0, 0) scale(var(--scale,1)); opacity: 0; }
            10% { opacity: var(--o,.8); }
            100% { transform: translate(var(--drift,40px), -110vh) scale(var(--scale,1)); opacity: 0; }
        }
    </style>
</head>

        let SCENARIO = FALLBACK_SCENARIO;

        async function loadScenario() {
            try {
                const res = await fetch('scenario.json', { cache: 'no-cache' });
                if (res.ok) {
                    const data = await res.json();
                    if (Array.isArray(data)) {
                        SCENARIO = data;
                        console.log('SCENARIO loaded from scenario.json', SCENARIO.length);
                    } else if (Array.isArray(data?.scenes)) {
                        SCENARIO = data.scenes;
                        console.log('SCENARIO loaded from scenario.json (scenes)', SCENARIO.length);
                    }
                }
            } catch (e) {
                console.warn('Failed to load scenario.json, using fallback', e);
            }
        }

        async function loadStrings() {
            const langs = ['ja', 'en'];
            gameState.strings = {};
            for (const lang of langs) {
                try {
                    const res = await fetch(`strings/${lang}.json`, { cache: 'no-cache' });
                    if (res.ok) {
                        const table = await res.json();
                        gameState.strings[lang] = table || {};
                    }
                } catch (e) {
                    console.warn(`Failed to load strings for ${lang}`, e);
                    gameState.strings[lang] = gameState.strings[lang] || {};
                }
            }
        }

        function initBGM() {
            bgmTitle = new Audio(AUDIO.title);
            bgmTitle.loop = true;
            bgmTitle.volume = 0;

            bgmIngame = new Audio(AUDIO.ingame);
            bgmIngame.loop = true;
            bgmIngame.volume = 0;

            bgmTitleTrue = new Audio(AUDIO.titleTrue);
            bgmTitleTrue.loop = true;
            bgmTitleTrue.volume = 0;
            
            console.log("BGM初期化完了 - 目標音量: 25%");
        }

        function playBGM(type) {
            if (fadeInterval) {
                clearInterval(fadeInterval);
                fadeInterval = null;
            }

            if (currentBGM) {
                currentBGM.pause();
                currentBGM.currentTime = 0;
                currentBGM.volume = 0;
            }

            if (type === 'title') {
                const endings = loadEndingData();
                const allCollected = endings.escape && endings.corruption && endings.taken && endings.true;
                currentBGM = allCollected ? bgmTitleTrue : bgmTitle;
            } else if (type === 'ingame') {
                currentBGM = bgmIngame;
            }

            if (currentBGM && !gameState.isMuted) {
                currentBGM.volume = 0;
                currentBGM.play().catch(err => console.log('BGM再生エラー:', err));
                
                let currentStep = 0;
                const target = getTargetVolume();
                const volumeStep = target / FADE_STEPS;
                const timeStep = FADE_DURATION / FADE_STEPS;
                
                fadeInterval = setInterval(() => {
                    currentStep++;
                    if (currentStep >= FADE_STEPS) {
                        currentBGM.volume = target;
                        clearInterval(fadeInterval);
                        fadeInterval = null;
                    } else {
                        currentBGM.volume = volumeStep * currentStep;
                    }
                }, timeStep);
            }
        }

        function toggleMute() {
            gameState.isMuted = !gameState.isMuted;
            
            if (gameState.isMuted) {
                if (fadeInterval) {
                    clearInterval(fadeInterval);
                    fadeInterval = null;
                }
                if (currentBGM) currentBGM.pause();
            } else {
                if (currentBGM) {
                    currentBGM.volume = 0;
                    currentBGM.play().catch(err => console.log('BGM再生エラー:', err));
                    
                    let currentStep = 0;
                    const target = getTargetVolume();
                    const volumeStep = target / FADE_STEPS;
                    const timeStep = FADE_DURATION / FADE_STEPS;
                    
                    fadeInterval = setInterval(() => {
                        currentStep++;
                        if (currentStep >= FADE_STEPS) {
                            currentBGM.volume = target;
                            clearInterval(fadeInterval);
                            fadeInterval = null;
                        } else {
                            currentBGM.volume = volumeStep * currentStep;
                        }
                    }, timeStep);
                }
            }
            
            render();
        }

        function getCurrentScene() {
            return SCENARIO.find(s => s.id === gameState.currentSceneId);
        }

        function applyParameters(params) {
            if (params) {
                gameState.parameters.intimacy = Math.max(0, Math.min(100, gameState.parameters.intimacy + (params.intimacy || 0)));
                gameState.parameters.fear = Math.max(0, Math.min(100, gameState.parameters.fear + (params.fear || 0)));
                if (typeof params.courage === 'number') {
                    gameState.parametersHidden.courage = Math.max(0, Math.min(100, gameState.parametersHidden.courage + params.courage));
                }
                if (typeof params.curiosity === 'number') {
                    gameState.parametersHidden.curiosity = Math.max(0, Math.min(100, gameState.parametersHidden.curiosity + params.curiosity));
                }
            }
        }

        function renderFlowchart() {
            const visited = loadVisitedScenes();
            const endings = loadEndingData();
            
            const nodes = [
                { id: 'scene1', x: 400, y: 50, name: '教室', type: 'scene' },
                { id: 'scene2', x: 400, y: 120, name: '結衣登場', type: 'scene' },
                { id: 'choice1', x: 400, y: 190, name: '選択：帰宅', type: 'choice' },
                { id: 'scene3', x: 250, y: 260, name: '一緒に帰る', type: 'scene' },
                { id: 'scene4', x: 550, y: 260, name: '断る', type: 'scene' },
                { id: 'scene5', x: 400, y: 330, name: '廊下', type: 'scene' },
                { id: 'scene5b', x: 400, y: 400, name: '影発見', type: 'scene' },
                { id: 'scene5c', x: 400, y: 470, name: '口裂け女', type: 'scene' },
                { id: 'qte1', x: 400, y: 540, name: 'QTE選択', type: 'qte' },
                { id: 'ending_escape', x: 150, y: 610, name: 'NORMAL END', type: 'ending', endingId: 'escape' },
                { id: 'ending_corruption', x: 400, y: 610, name: 'BAD END①', type: 'ending', endingId: 'corruption' },
                { id: 'ending_taken', x: 550, y: 610, name: 'BAD END②', type: 'ending', endingId: 'taken' },
                { id: 'ending_true', x: 250, y: 680, name: 'TRUE END', type: 'ending', endingId: 'true' }
            ];
            
            const connections = [
                ['scene1', 'scene2'],
                ['scene2', 'choice1'],
                ['choice1', 'scene3'],
                ['choice1', 'scene4'],
                ['scene3', 'scene5'],
                ['scene4', 'scene5'],
                ['scene5', 'scene5b'],
                ['scene5b', 'scene5c'],
                ['scene5c', 'qte1'],
                ['qte1', 'ending_escape'],
                ['qte1', 'ending_corruption'],
                ['qte1', 'ending_taken'],
                ['qte1', 'ending_true']
            ];
            
            const linesHTML = connections.map(([from, to]) => {
                const fromNode = nodes.find(n => n.id === from);
                const toNode = nodes.find(n => n.id === to);
                const isVisited = visited.includes(from) && visited.includes(to);
                return `<line x1="${fromNode.x}" y1="${fromNode.y}" x2="${toNode.x}" y2="${toNode.y}" class="flowchart-line ${isVisited ? 'visited' : ''}"/>`;
            }).join('');
            
            const nodesHTML = nodes.map(node => {
                const isVisited = visited.includes(node.id);
                const isEnding = node.type === 'ending';
                const endingCollected = isEnding ? endings[node.endingId] : false;
                const sceneData = SCENARIO.find(s => s.id === node.id);
                const hasThumbnail = sceneData && sceneData.thumbnail && isVisited;
                
                let bgColor = '#4b5563';
                let borderColor = '#6b7280';
                
                if (isEnding) {
                    if (endingCollected) {
                        bgColor = node.endingId === 'true' ? '#9333ea' : (node.endingId === 'escape' ? '#16a34a' : '#dc2626');
                        borderColor = node.endingId === 'true' ? '#c084fc' : (node.endingId === 'escape' ? '#22c55e' : '#ef4444');
                    } else {
                        bgColor = '#1f2937';
                        borderColor = '#374151';
                    }
                } else if (isVisited) {
                    bgColor = '#7e22ce';
                    borderColor = '#a855f7';
                }
                
                const displayName = (isEnding && !endingCollected) ? '???' : node.name;
                const thumbnailUrl = hasThumbnail ? sceneData.thumbnail : '';
                const canShowHint = !isEnding && !isVisited && (gameState.entitlements.hintPack || gameState.flowchartHintsRevealed[node.id]);
                const hintBtn = (!isEnding && !isVisited) ? `<g>
                    <rect x="${node.x + 68}" y="${node.y - 18}" width="40" height="16" rx="4" fill="#2563eb" stroke="#93c5fd" stroke-width="1" onclick="revealHint('${node.id}')"/>
                    <text x="${node.x + 88}" y="${node.y - 6}" text-anchor="middle" fill="white" font-size="10" font-weight="bold" onclick="revealHint('${node.id}')">ヒント</text>
                </g>` : '';
                const hintText = canShowHint ? (sceneData?.hint || '') : '';
                
                const clickAttr = isVisited ? `onclick="gameState.screen='playing'; gameState.currentSceneId='${node.id}'; gameState.history=[]; gameState.showChoices=false; render(); startTextAnimation();"` : '';
                return `
                    <g class="flowchart-node" ${clickAttr} onmouseenter="showPreview(event, '${thumbnailUrl}')" onmouseleave="hidePreview()">
                        <rect x="${node.x - 60}" y="${node.y - 20}" width="120" height="40" rx="8" fill="${bgColor}" stroke="${borderColor}" stroke-width="2"/>
                        <text x="${node.x}" y="${node.y + 5}" text-anchor="middle" fill="white" font-size="12" font-weight="bold" style="pointer-events: none;">${displayName}</text>
                        ${hintBtn}
                        ${hintText ? `<text x="${node.x}" y="${node.y + 22}" text-anchor="middle" fill="#93c5fd" font-size="10">${hintText}</text>` : ''}
                    </g>
                `;
            }).join('');
            
            return `
                <div class="relative w-full h-screen overflow-hidden bg-gray-900">
                    <div class="absolute inset-0 flex flex-col items-center">
                        <div class="w-full bg-gray-800 p-4 flex justify-between items-center">
                            <h2 class="text-white text-2xl font-bold">フローチャート</h2>
                            <button onclick="gameState.screen='title'; render();" class="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700">
                                タイトルに戻る
                            </button>
                        </div>
                        
                        <div class="flex-1 overflow-auto p-8">
                            <svg width="800" height="800" style="min-width: 800px; min-height: 800px;">
                                ${linesHTML}
                                ${nodesHTML}
                            </svg>
                        </div>
                        
                        <div class="w-full bg-gray-800 p-4 text-white text-center">
                            <div class="flex justify-center gap-8">
                                <div class="flex items-center gap-2">
                                    <div class="w-4 h-4 bg-purple-700 rounded"></div>
                                    <span>到達済み</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <div class="w-4 h-4 bg-gray-600 rounded"></div>
                                    <span>未到達</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <div class="w-4 h-4 bg-green-600 rounded"></div>
                                    <span>NORMAL回収</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <div class="w-4 h-4 bg-purple-600 rounded"></div>
                                    <span>TRUE回収</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div id="flowchart-preview" class="flowchart-preview">
                        <img id="flowchart-preview-img" src="" alt="Preview">
                    </div>
                </div>
            `;
        }

        function render() {
            const app = document.getElementById('app');
            if (gameState.screen === 'title') {
                app.innerHTML = renderTitle();
            } else if (gameState.screen === 'flowchart') {
                app.innerHTML = renderFlowchart();
            } else {
                app.innerHTML = renderGame();
            }
        }

        function t(key, fallback) {
            const table = gameState.strings?.[gameState.language] || {};
            return table[key] || fallback;
        }

        function toggleLanguage() {
            gameState.language = gameState.language === 'ja' ? 'en' : 'ja';
            localStorage.setItem('novelgame_lang', gameState.language);
            render();
        }

        function startTextAnimation() {
            const scene = getCurrentScene();
            
            saveVisitedScene(scene.id);
            
            if (scene.isEnding && scene.endingId) {
                saveEndingData(scene.endingId);
            }
            
            if (scene.type === 'check') {
                if (checkTrueEndingCondition()) {
                    gameState.currentSceneId = scene.nextSceneHigh;
                } else {
                    gameState.currentSceneId = scene.nextSceneLow;
                }
                startTextAnimation();
                return;
            }
            
            if (scene.type === 'qte-choice') {
                gameState.textDisplay = scene?.text || '';
                gameState.isTextComplete = true;
                render();
                startQTE();
                return;
            }
            
            gameState.textDisplay = '';
            gameState.textIndex = 0;
            gameState.isTextComplete = false;
            gameState.showChoices = false;
            gameState._backlogLoggedForScene = false;

            if (textTimer) clearInterval(textTimer);
            
            const visited = loadVisitedScenes();
            const isRead = visited.includes(scene.id);
            const speed = gameState.settings.textSpeedMs;
            const shouldSkipTyping = (gameState.settings.skipping && isRead) || (gameState.settings.skipRead && isRead);

            if (shouldSkipTyping) {
                gameState.textDisplay = scene.text;
                gameState.textIndex = scene.text.length;
                gameState.isTextComplete = true;
                onTextCompleted(scene);
                render();
                maybeAutoAdvance(scene);
                return;
            }

            const maxCharsPerLine = 25;
            const maxLines = 3;
            const maxChars = maxCharsPerLine * maxLines;

            textTimer = setInterval(() => {
                const scene = getCurrentScene();
                const full = scene.text || '';
                const limited = full.slice(0, maxChars);
                if (gameState.textIndex < limited.length) {
                    gameState.textDisplay = limited.slice(0, gameState.textIndex + 1);
                    gameState.textIndex++;
                    render();
                } else {
                    gameState.isTextComplete = true;
                    clearInterval(textTimer);
                    onTextCompleted(scene);
                    render();
                    maybeAutoAdvance(scene);
                }
            }, Math.max(10, speed));
        }

        function maybeAutoAdvance(scene) {
            if (!scene) return;
            if (!gameState.settings.auto) return;
            if (!scene.nextScene) return;
            setTimeout(() => {
                // Scene might have changed in the meantime
                const current = getCurrentScene();
                if (current && current.id === scene.id && gameState.isTextComplete && !gameState.qteActive && !scene.isEnding && scene.type !== 'choice') {
                    gameState.history.push(gameState.currentSceneId);
                    gameState.currentSceneId = scene.nextScene;
                    const nextScene = getCurrentScene();
                    if (nextScene.type === 'qte-choice') {
                        render();
                        startQTE();
                    } else {
                        startTextAnimation();
                    }
                }
            }, Math.max(0, gameState.settings.autoDelayMs));
        }

        function startQTE() {
            const scene = getCurrentScene();
            
            if (scene.type === 'qte-choice') {
                gameState.qteActive = true;
                gameState.qteChoices = scene.choices.map(choice => ({
                    text: choice.text,
                    time: choice.time,
                    timeLeft: choice.time,
                    nextScene: choice.nextScene,
                    parameters: choice.parameters,
                    disappeared: false,
                    qteType: choice.qteType || 'click',
                    targetPresses: choice.targetPresses || 0,
                    currentPresses: 0,
                    holdDuration: choice.holdDuration || 0,
                    currentHold: 0
                }));
                if (scene.text) {
                    appendBacklogEntry({ type: 'system', text: scene.text, sceneId: scene.id });
                }
                
                render();

                qteChoiceTimers.forEach(timer => clearInterval(timer));
                qteChoiceTimers = [];

                const assist = gameState.entitlements?.qteAssist;
                const slowFactor = assist ? 0.7 : 1.0; // アシスト時は時間の減少を30%抑制
                gameState.qteChoices.forEach((choice, idx) => {
                    const timer = setInterval(() => {
                        gameState.qteChoices[idx].timeLeft -= Math.round(100 * slowFactor);
                        
                        if (gameState.qteChoices[idx].timeLeft <= 0) {
                            clearInterval(timer);
                            gameState.qteChoices[idx].disappeared = true;
                            
                            const allDisappeared = gameState.qteChoices.every(c => c.disappeared);
                            if (allDisappeared) {
                                setTimeout(() => {
                                    qteChoiceTimers.forEach(t => clearInterval(t));
                                    gameState.qteActive = false;
                                    gameState.currentSceneId = scene.timeoutScene;
                                    startTextAnimation();
                                }, 800);
                            }
                        }
                        render();
                    }, 100);
                    qteChoiceTimers.push(timer);
                });
            }
        }

        function startGame() {
            gameState.screen = 'playing';
            gameState.currentSceneId = 'scene1';
            gameState.history = [];
            gameState.parameters = { intimacy: 50, fear: 50 };
            gameState.showChoices = false;
            gameState.backlog = [];
            gameState.showBacklog = false;
            gameState._backlogLoggedForScene = false;
            playBGM('ingame');
            render();
            startTextAnimation();
        }

        function handleClick(event) {
            const scene = getCurrentScene();
            
            if (scene.type === 'qte-choice' || gameState.qteActive || scene.isEnding) return;
            
            if (scene.type === 'choice') {
                if (!gameState.isTextComplete) {
                    const maxCharsPerLine = 25; const maxLines = 3; const maxChars = maxCharsPerLine * maxLines;
                    const full = scene.text || ''; const limited = full.slice(0, maxChars);
                    gameState.textDisplay = limited;
                    gameState.textIndex = limited.length;
                    gameState.isTextComplete = true;
                    if (textTimer) clearInterval(textTimer);
                    onTextCompleted(scene);
                    render();
                } else if (!gameState.showChoices) {
                    gameState.showChoices = true;
                    render();
                }
                return;
            }
            
            if (!gameState.isTextComplete) {
                const maxCharsPerLine = 25; const maxLines = 3; const maxChars = maxCharsPerLine * maxLines;
                const full = scene.text || ''; const limited = full.slice(0, maxChars);
                gameState.textDisplay = limited;
                gameState.textIndex = limited.length;
                gameState.isTextComplete = true;
                if (textTimer) clearInterval(textTimer);
                onTextCompleted(scene);
                render();
            } else {
                if (scene.nextScene) {
                    gameState.history.push(gameState.currentSceneId);
                    gameState.currentSceneId = scene.nextScene;
                    const nextScene = getCurrentScene();
                    if (nextScene.type === 'qte-choice') {
                        render();
                        startQTE();
                    } else {
                        startTextAnimation();
                    }
                }
            }
        }

        function handleChoice(nextScene, parameters, choiceText) {
            if (choiceText) {
                appendBacklogEntry({ type: 'choice', text: choiceText });
            }
            applyParameters(parameters);
            gameState.history.push(gameState.currentSceneId);
            gameState.currentSceneId = nextScene;
            gameState.showChoices = false;
            const scene = getCurrentScene();
            if (scene.type === 'qte-choice') {
                render();
                startQTE();
            } else {
                startTextAnimation();
            }
        }

        function handleQteChoiceClick(choiceIndex) {
            if (!gameState.qteActive) return;
            
            const choice = gameState.qteChoices[choiceIndex];
            if (!choice || choice.disappeared || choice.timeLeft <= 0) return;
            // すべてのQTEタイプを単発クリックで反応させる
            applyParameters(choice.parameters);
            endQteTo(choice.nextScene, choice.text);
        }

        function handleQteButtonClick(event, idx) {
            event.stopPropagation();
            handleQteChoiceClick(idx);
        }

        function endQteTo(nextScene, labelText) {
            gameState.qteActive = false;
            qteChoiceTimers.forEach(timer => clearInterval(timer));
            qteChoiceTimers = [];
            appendBacklogEntry({ type: 'choice', text: labelText, sceneId: gameState.currentSceneId });
            gameState.currentSceneId = nextScene;
            startTextAnimation();
        }

        function saveGame() {
            const saveData = {
                currentSceneId: gameState.currentSceneId,
                history: gameState.history,
                parameters: gameState.parameters,
                timestamp: new Date().toISOString()
            };
            localStorage.setItem('novelgame_save', JSON.stringify(saveData));

            const saveData = localStorage.getItem('novelgame_save');
            if (saveData) {
                const data = JSON.parse(saveData);
                gameState.currentSceneId = data.currentSceneId;
                gameState.history = data.history;
                gameState.parameters = data.parameters || { intimacy: 50, fear: 50 };
                gameState.screen = 'playing';
                gameState.showMenu = false;
                gameState.showChoices = false;
                gameState.backlog = [];
                gameState.showBacklog = false;

                playBGM('ingame');

            gameState.settings.autoDelayMs = Number(v);

        function setSkipRead(v) {

            return Math.max(0, Math.min(1, gameState.settings?.bgmVolume ?? 0.25));
        }

        function setBgmVolume(v) {
            const val = Number(v);
            gameState.settings.bgmVolume = Math.max(0, Math.min(1, val));
            if (currentBGM && !gameState.isMuted) {
                currentBGM.volume = getTargetVolume();
            }
        }

            const val = Number(v);
            gameState.settings.sfxVolume = Math.max(0, Math.min(1, val));

        function saveSettings() {
            const toSave = {
                textSpeedMs: gameState.settings.textSpeedMs,
                auto: gameState.settings.auto,
                autoDelayMs: gameState.settings.autoDelayMs,
                skipRead: gameState.settings.skipRead,

                sfxVolume: gameState.settings.sfxVolume,

            };

        function loadSettings() {
            const raw = localStorage.getItem('novelgame_settings');
            if (!raw) return;
            try {
                const parsed = JSON.parse(raw);
                gameState.settings.textSpeedMs = Number(parsed.textSpeedMs ?? gameState.settings.textSpeedMs);
                gameState.settings.auto = !!parsed.auto;
                gameState.settings.autoDelayMs = Number(parsed.autoDelayMs ?? gameState.settings.autoDelayMs);
                gameState.settings.skipRead = !!parsed.skipRead;
                gameState.settings.bgmVolume = Number(parsed.bgmVolume ?? gameState.settings.bgmVolume);
                gameState.settings.sfxVolume = Number(parsed.sfxVolume ?? gameState.settings.sfxVolume);
                gameState.settings.vibration = !!parsed.vibration;
            } catch {}
        }

                gameState.entitlements = Object.assign({}, gameState.entitlements, parsed);

                render();

            const ok = confirm('ヒントを見るには短い広告を視聴しますか？（開発中: 今は即時解放）');
            if (ok) {
                gameState.flowchartHintsRevealed[nodeId] = true;
                render();
            }
        }

        function getUnlockedCGs() {
            const endings = loadEndingData();
            const cgList = [];
            if (endings.true) cgList.push({ id: 'true', title: 'TRUE END', url: IMAGES.endingTrue });
            if (endings.corruption) cgList.push({ id: 'corruption', title: 'BAD END①', url: IMAGES.endingCorruption });
            if (endings.escape) cgList.push({ id: 'escape', title: 'NORMAL END', url: IMAGES.endingTrue });
            if (endings.taken) cgList.push({ id: 'taken', title: 'BAD END②', url: IMAGES.endingTrue });
            return cgList;
        }

        function openGallery() {
            if (!gameState.entitlements.album) {
                alert('フォトアルバムは未購入です');
                return;
            }
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed'; overlay.style.inset = '0';
            overlay.style.background = 'rgba(0,0,0,0.9)'; overlay.style.zIndex = '1000';
            overlay.style.display = 'flex'; overlay.style.alignItems = 'center'; overlay.style.justifyContent = 'center';

            const panel = document.createElement('div');
            panel.style.width = 'min(960px, 95vw)'; panel.style.maxHeight = '90vh'; panel.style.overflow = 'hidden';
            panel.style.background = '#0f172a'; panel.style.border = '2px solid #10b981'; panel.style.borderRadius = '12px'; panel.style.color = 'white';

            const header = document.createElement('div');
            header.style.display = 'flex'; header.style.justifyContent = 'space-between'; header.style.alignItems = 'center';
            header.style.padding = '12px 16px'; header.style.background = '#111827';
            const title = document.createElement('div'); title.textContent = 'ギャラリー'; title.style.fontWeight = 'bold';
            const closeBtn = document.createElement('button'); closeBtn.textContent = '閉じる'; closeBtn.style.background = '#4b5563'; closeBtn.style.borderRadius = '6px'; closeBtn.style.padding = '6px 12px'; closeBtn.style.color = 'white'; closeBtn.onclick = () => overlay.remove();
            header.appendChild(title); header.appendChild(closeBtn);

            const body = document.createElement('div'); body.style.padding = '16px'; body.style.maxHeight = 'calc(90vh - 56px)'; body.style.overflow = 'auto';
            const grid = document.createElement('div'); grid.style.display = 'grid'; grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(220px, 1fr))'; grid.style.gap = '12px';

            const cgs = getUnlockedCGs();
            if (cgs.length === 0) {
                const empty = document.createElement('div'); empty.textContent = '解禁されたCGがありません'; empty.style.color = '#d1d5db';
                body.appendChild(empty);
            } else {
                cgs.forEach(cg => {
                    const card = document.createElement('div'); card.style.border = '1px solid #1f2937'; card.style.borderRadius = '8px'; card.style.overflow = 'hidden';
                    const img = document.createElement('img'); img.src = cg.url; img.alt = cg.title; img.style.width = '100%'; img.style.display = 'block';
                    const bar = document.createElement('div'); bar.style.display = 'flex'; bar.style.justifyContent = 'space-between'; bar.style.alignItems = 'center'; bar.style.padding = '8px 10px'; bar.style.background = '#111827';
                    const label = document.createElement('div'); label.textContent = cg.title;
                    const btns = document.createElement('div'); btns.style.display = 'flex'; btns.style.gap = '8px';
                    const viewBtn = document.createElement('button'); viewBtn.textContent = '拡大'; viewBtn.style.background = '#10b981'; viewBtn.style.borderRadius = '6px'; viewBtn.style.padding = '6px 12px'; viewBtn.style.color = 'white';
                    viewBtn.onclick = () => openCGViewer(cg);
                    const saveBtn = document.createElement('a'); saveBtn.textContent = '保存'; saveBtn.style.background = '#2563eb'; saveBtn.style.borderRadius = '6px'; saveBtn.style.padding = '6px 12px'; saveBtn.style.color = 'white'; saveBtn.style.textDecoration = 'none';
                    saveBtn.href = cg.url; saveBtn.download = `${cg.id}.png`;
                    btns.appendChild(viewBtn); btns.appendChild(saveBtn);
                    bar.appendChild(label); bar.appendChild(btns);
                    card.appendChild(img); card.appendChild(bar);
                    grid.appendChild(card);
                });
                body.appendChild(grid);
            }

            panel.appendChild(header); panel.appendChild(body); overlay.appendChild(panel); document.body.appendChild(overlay);
        }

        function openCGViewer(cg) {
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed'; overlay.style.inset = '0'; overlay.style.background = 'rgba(0,0,0,0.95)'; overlay.style.zIndex = '1100';
            const img = document.createElement('img'); img.src = cg.url; img.alt = cg.title; img.style.maxWidth = '95vw'; img.style.maxHeight = '95vh'; img.style.display = 'block'; img.style.margin = 'auto'; img.style.border = '2px solid #10b981'; img.style.borderRadius = '12px';
            overlay.onclick = () => overlay.remove();
            overlay.appendChild(img); document.body.appendChild(overlay);
        }

        function evaluateChoiceLock(lock) {
            if (!lock) return true;
            // 条件は AND で評価
            if (typeof lock.minIntimacy === 'number' && gameState.parameters.intimacy < lock.minIntimacy) return false;
            if (typeof lock.maxFear === 'number' && gameState.parameters.fear > lock.maxFear) return false;
            if (typeof lock.minCourage === 'number' && gameState.parametersHidden.courage < lock.minCourage) return false;
            if (typeof lock.minCuriosity === 'number' && gameState.parametersHidden.curiosity < lock.minCuriosity) return false;
            if (Array.isArray(lock.requiredEndings)) {
                const endings = loadEndingData();
                for (const eid of lock.requiredEndings) {
                    if (!endings[eid]) return false;
                }
            }
            return true;
        }

        function appendBacklogEntry(entry) {
            if (!entry || !entry.text) return;
            const now = new Date();
            const timeText = now.toLocaleTimeString('ja-JP', { hour12: false });
            gameState.backlog.push({
                name: entry.name || '',
                text: entry.text,
                type: entry.type || 'dialog',
                sceneId: entry.sceneId || gameState.currentSceneId,
                timestamp: entry.timestamp || timeText
            });
        }

        function onTextCompleted(scene) {
            if (gameState._backlogLoggedForScene) return;
            if (!scene || !scene.text) return;
            if (scene.type === 'qte-choice') return;
            appendBacklogEntry({
                name: scene.character ? scene.character.name : '',
                text: scene.text,
                type: 'dialog',
                sceneId: scene.id
            });
            gameState._backlogLoggedForScene = true;
        }

        (async () => {
            await Promise.all([loadScenario(), loadStrings()]);
            loadEntitlements();
            initBGM();
            render();
            playBGM('title');
        })();

        // Keybindings: B to toggle backlog, Esc to close, F5/F9 quick save/load
        document.addEventListener('keydown', (e) => {
            // Avoid interfering with input fields (future-proof)
            const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
            if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'b' || e.key === 'B') {
                toggleBacklog();
            } else if (e.key === 'Escape') {
                closeBacklog();
            } else if (e.key === 'F5') {
                e.preventDefault();
                saveGameToSlot(1);
            } else if (e.key === 'F9') {
                e.preventDefault();
                loadGameFromSlot(1);
            }
        });
    </script>
</body>
</html>
